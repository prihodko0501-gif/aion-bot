<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AION</title>

<link rel="stylesheet" href="/app/aion.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app-shell">

<!-- SCREEN 1 -->

<div class="screen active" id="screen-home">

<div class="hero">

<div class="planet planet-home"></div>

<div class="logo-mark">

<div class="logo-outer"></div>
<div class="logo-inner"></div>
<div class="logo-core"></div>

</div>

<div class="brand">AION</div>

<div class="brand-sub">
BIOLOGICAL UPGRADE SYSTEM
</div>

<button class="cta enter-btn" id="enterBtn">

ENTER SYSTEM →

</button>

</div>


<div class="glass-card biotime-card">

<div class="section-kicker">

BIO TIME

</div>

<div class="biotime-value" id="homeBiotime">

8.4

</div>

<div class="wave-glow"></div>

</div>

</div>


<!-- SCREEN 2 -->

<div class="screen" id="screen-dashboard">

<div class="dashboard-head">

<div class="planet planet-modules"></div>

<div class="logo-mark small">

<div class="logo-outer"></div>
<div class="logo-inner"></div>
<div class="logo-core"></div>

</div>

<div class="brand brand-small">

AION

</div>

<div class="brand-sub-small">

BIOLOGICAL UPGRADE SYSTEM

</div>

</div>


<div class="modules-header">

MODULES

</div>


<div class="modules-grid">

<button class="module-card" data-open="screen-sleep">

<div class="module-icon">

🌙

</div>

<div class="module-title">

SLEEP

</div>

</button>


<button class="module-card">

<div class="module-icon">

🧠

</div>

<div class="module-title">

STRESS

</div>

</button>


<button class="module-card">

<div class="module-icon">

❤️

</div>

<div class="module-title">

RECOVERY

</div>

</button>


<button class="module-card">

<div class="module-icon">

➕

</div>

<div class="module-title">

LONGEVITY

</div>

</button>

</div>


</div>


<!-- SCREEN 3 -->

<div class="screen" id="screen-sleep">

<div class="sleep-topbar">

<button class="back-btn" data-open="screen-dashboard">

← Back

</button>

</div>


<div class="sleep-title">

SLEEP

</div>

<div class="sleep-subtitle">

Optimization Program

</div>


<div class="glass-card sleep-score-card">

<div class="score-number" id="sleepScoreValue">

92

</div>

<div class="score-grade">

Excellent

</div>

</div>


<div class="metric-list">

<div class="metric-row">

<div>

<div class="metric-title">

Sleep Duration

</div>

<div class="metric-sub">

Fact

</div>

</div>

<div class="metric-value">

7h 25m

</div>

</div>


<div class="metric-row">

<div>

<div class="metric-title">

Time to Fall Asleep

</div>

<div class="metric-sub">

Normal

</div>

</div>

<div class="metric-value">

5m

</div>

</div>


<div class="metric-row">

<div>

<div class="metric-title">

Sleep Stability

</div>

<div class="metric-sub">

Optimal

</div>

</div>

<div class="metric-value">

94%

</div>

</div>

</div>


<button class="cta start-analysis">

START ANALYSIS →

</button>


</div>


<!-- NAVIGATION -->

<div class="bottom-nav">

<button class="nav-btn active">

<span class="nav-ico">🏠</span>

</button>

<button class="nav-btn">

<span class="nav-ico">⏱</span>

</button>

<button class="nav-btn center-glow">

<span class="nav-ico">A</span>

</button>

<button class="nav-btn">

<span class="nav-ico">❤️</span>

</button>

<button class="nav-btn">

<span class="nav-ico">👤</span>

</button>

</div>


</div>


<script src="/app/aion.js"></script>

</body>

</html>
