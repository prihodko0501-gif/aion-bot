<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AION</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

background:
radial-gradient(circle at 60% 20%, rgba(120,180,255,0.25), transparent 30%),
linear-gradient(#020814,#031c3f);
}

.hero{
text-align:center;
padding-top:60px;
}

.logo-box{
width:200px;
margin:auto;

filter:
drop-shadow(0 0 30px rgba(120,200,255,0.8))
drop-shadow(0 0 60px rgba(80,120,255,0.5));
}

.brand{
font-size:56px;
letter-spacing:10px;
margin-top:10px;
}

.subtitle{
letter-spacing:6px;
font-size:14px;
opacity:0.7;
margin-top:10px;
}

.enter{
margin:40px auto;
width:280px;
padding:16px;
border-radius:40px;

background:linear-gradient(#1c3a6a,#081832);

border:1px solid rgba(120,200,255,0.4);

text-align:center;
font-size:18px;

box-shadow:
0 0 40px rgba(120,200,255,0.35),
inset 0 0 20px rgba(120,200,255,0.15);
}

.card{
width:320px;
margin:40px auto;
padding:30px;

border-radius:30px;

background:rgba(0,0,0,0.4);

border:1px solid rgba(120,200,255,0.3);

text-align:center;

box-shadow:
0 0 60px rgba(120,200,255,0.18),
inset 0 0 20px rgba(120,200,255,0.1);
}

.biotime{
font-size:90px;
font-weight:200;
}

.nav{
position:fixed;
bottom:20px;
left:20px;
right:20px;

height:70px;

background:rgba(10,20,40,0.8);

border-radius:40px;

display:flex;
align-items:center;
justify-content:space-around;

box-shadow:0 0 40px rgba(120,200,255,0.2);
}

.center{
width:70px;
height:70px;

background:radial-gradient(#5ebaff,#1a3cff);

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 0 40px rgba(120,200,255,0.8),
0 0 80px rgba(120,200,255,0.4);
}

</style>
</head>

<body>

<section class="hero">

<div class="logo-box">

<svg viewBox="0 0 260 300">

<defs>

<linearGradient id="aionMain" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="40%" stop-color="#9ed8ff"/>
<stop offset="100%" stop-color="#3b6dff"/>
</linearGradient>

<radialGradient id="aionDot">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="60%" stop-color="#9bd8ff"/>
<stop offset="100%" stop-color="#4a7dff"/>
</radialGradient>

</defs>

<!-- левая грань -->
<path
d="M130 10 L40 240 L80 240 L130 120 Z"
fill="url(#aionMain)"
/>

<!-- правая грань -->
<path
d="M130 10 L220 240 L180 240 L130 120 Z"
fill="url(#aionMain)"
/>

<!-- внутренняя стрелка -->
<path
d="M130 120 L170 200 L150 200 L130 150 L110 200 L90 200 Z"
fill="#0f2a60"
/>

<!-- светящаяся точка -->
<circle
cx="130"
cy="120"
r="10"
fill="url(#aionDot)"
/>

</svg>

</div>

<div class="brand">AION</div>

<div class="subtitle">
BIOLOGICAL UPGRADE SYSTEM
</div>

<div class="enter">
ENTER SYSTEM →
</div>

</section>

<div class="card">

<div style="letter-spacing:6px; opacity:0.7;">
BIO TIME
</div>

<div class="biotime">
8.4
</div>

</div>

<div class="nav">

🏠

🕒

<div class="center">A</div>

📈

👤

</div>

</body>
</html>
