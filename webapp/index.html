<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg-top:#081b4a;
      --bg-mid:#04102a;
      --bg-bottom:#020611;
      --line:rgba(130,165,255,.14);
      --glass:rgba(4,11,28,.46);
      --glass-deep:rgba(2,8,22,.72);
      --text:#eef4ff;
      --muted:rgba(230,236,250,.74);
      --glow:#84cfff;
      --blue:#7caeff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:#020611;
      overflow-x:hidden;
    }

    body{
      background:
        radial-gradient(circle at 50% 14%, rgba(59,111,255,.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(86,184,255,.14), transparent 26%),
        linear-gradient(180deg,var(--bg-top) 0%, var(--bg-mid) 36%, var(--bg-bottom) 78%, #01030a 100%);
    }

    .screen{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      padding:24px 22px 150px;
    }

    .stars,
    .stars2,
    .stars3{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .stars::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 24%, rgba(255,255,255,.88) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 28%, rgba(255,255,255,.70) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 44%, rgba(255,255,255,.48) 0 2px, transparent 3px),
        radial-gradient(circle at 73% 57%, rgba(255,255,255,.42) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 69%, rgba(255,255,255,.28) 0 2px, transparent 3px),
        radial-gradient(circle at 66% 76%, rgba(255,255,255,.24) 0 2px, transparent 3px);
      opacity:.92;
    }

    .stars2::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 40% 18%, rgba(255,255,255,.25) 0 1px, transparent 2px),
        radial-gradient(circle at 58% 36%, rgba(255,255,255,.20) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 58%, rgba(255,255,255,.20) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 66%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 65% 24%, rgba(255,255,255,.20) 0 1px, transparent 2px);
      opacity:.65;
    }

    .arc{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(131,160,255,.08);
      pointer-events:none;
    }

    .arc1{
      width:124vw;
      height:124vw;
      right:-48vw;
      top:7vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
    }

    .arc2{
      width:96vw;
      height:96vw;
      right:-30vw;
      top:18vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
      opacity:.72;
    }

    .arc3{
      width:150vw;
      height:150vw;
      left:-24vw;
      bottom:-78vh;
      border-right-color:transparent;
      border-bottom-color:transparent;
      border-top-color:rgba(137,203,255,.18);
      box-shadow:0 -16px 36px rgba(89,179,255,.08);
      opacity:.9;
    }

    .topbar{
      position:relative;
      z-index:4;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .fake-time{
      position:absolute;
      top:0;
      left:2px;
      font-size:16px;
      letter-spacing:.03em;
      opacity:.98;
      display:none;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border-radius:50%;
      border:1px solid rgba(136,163,255,.14);
      background:rgba(255,255,255,.015);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 18px rgba(108,144,255,.04);
    }

    .icon-btn svg{
      width:24px;
      height:24px;
      fill:none;
      stroke:#f3f7ff;
      stroke-width:1.8;
      opacity:.96;
    }

    .hero{
      position:relative;
      z-index:3;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-top:6px;
    }

    .logo-box{
      width:min(40vw,215px);
      max-width:215px;
      filter:drop-shadow(0 0 18px rgba(122,194,255,.16));
    }

    .logo-box svg{
      display:block;
      width:100%;
      height:auto;
    }

    .brand{
      margin-top:8px;
      font-size:clamp(56px,9.6vw,82px);
      line-height:1;
      letter-spacing:.14em;
      font-weight:300;
    }

    .subtitle{
      margin-top:18px;
      color:var(--muted);
      font-size:clamp(11px,2.3vw,17px);
      letter-spacing:.34em;
      white-space:nowrap;
    }

    .enter{
      margin-top:34px;
      width:min(73%,590px);
      min-width:280px;
      height:64px;
      border-radius:34px;
      border:1px solid rgba(127,159,255,.22);
      background:linear-gradient(180deg, rgba(25,50,117,.56), rgba(8,18,45,.60));
      box-shadow:
        inset 0 0 0 1px rgba(130,168,255,.02),
        0 0 18px rgba(77,142,255,.08),
        0 10px 22px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      font-size:clamp(17px,3.5vw,24px);
      letter-spacing:.08em;
      position:relative;
    }

    .enter::after{
      content:"";
      position:absolute;
      left:14%;
      right:14%;
      bottom:-1px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(129,210,255,.95), transparent);
      box-shadow:0 0 14px rgba(122,204,255,.45);
      opacity:.92;
    }

    .enter span:last-child{
      font-size:1.2em;
    }

    .card{
      position:relative;
      z-index:3;
      width:min(82%,660px);
      min-width:320px;
      min-height:250px;
      margin:40px auto 0;
      border-radius:30px;
      border:1px solid rgba(124,160,255,.13);
      background:linear-gradient(180deg, rgba(5,14,37,.52), rgba(2,8,22,.74));
      box-shadow:
        inset 0 0 26px rgba(64,113,255,.04),
        0 18px 40px rgba(0,0,0,.24);
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 115%, rgba(78,175,255,.10), transparent 34%);
      pointer-events:none;
    }

    .card-title{
      margin-top:30px;
      text-align:center;
      color:var(--muted);
      font-size:clamp(15px,2.2vw,22px);
      letter-spacing:.42em;
    }

    .biotime{
      margin-top:18px;
      text-align:center;
      font-size:clamp(92px,16vw,150px);
      font-weight:300;
      line-height:1;
    }

    .wave{
      position:absolute;
      left:0;
      right:0;
      bottom:16px;
      height:78px;
    }

    .wave svg{
      width:100%;
      height:100%;
    }

    .wave path{
      fill:none;
      stroke:#86d3ff;
      stroke-width:4;
      stroke-linecap:round;
      filter:
        drop-shadow(0 0 7px rgba(125,214,255,.82))
        drop-shadow(0 0 11px rgba(78,145,255,.34));
    }

    .nav{
      position:fixed;
      left:18px;
      right:18px;
      bottom:22px;
      z-index:6;
      height:72px;
      border-radius:28px;
      border:1px solid rgba(122,158,255,.13);
      background:linear-gradient(180deg, rgba(8,18,44,.82), rgba(2,8,22,.93));
      backdrop-filter:blur(14px);
      display:flex;
      align-items:center;
      justify-content:space-around;
      box-shadow:
        0 12px 24px rgba(0,0,0,.24),
        inset 0 0 20px rgba(84,128,255,.05);
    }

    .nav-item{
      width:54px;
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .nav-item svg{
      width:28px;
      height:28px;
      stroke:#eef5ff;
      stroke-width:1.8;
      fill:none;
      opacity:.98;
    }

    .nav-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:6px;
      width:90px;
      height:90px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 34%, rgba(177,229,255,.22), rgba(90,120,255,.18) 42%, rgba(10,21,52,.95) 76%);
      box-shadow:
        0 0 0 8px rgba(97,125,255,.05),
        0 0 20px rgba(92,168,255,.22),
        inset 0 0 30px rgba(130,180,255,.11);
    }

    .nav-center .mini{
      width:38px;
      height:38px;
      filter:drop-shadow(0 0 8px rgba(127,194,255,.34));
    }

    .domain{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:106px;
      z-index:5;
      padding:10px 24px;
      border-radius:20px;
      border:1px solid rgba(139,160,255,.10);
      background:rgba(18,27,54,.68);
      color:rgba(245,248,255,.92);
      font-size:15px;
      backdrop-filter:blur(8px);
    }

    @media (max-width:430px){
      .screen{padding:20px 20px 142px}
      .subtitle{letter-spacing:.24em}
      .enter{width:min(78%,560px); height:60px}
      .card{width:min(86%,640px); min-height:236px}
      .nav{height:68px}
      .nav-center{width:84px;height:84px}
      .domain{bottom:100px}
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="arc arc1"></div>
    <div class="arc arc2"></div>
    <div class="arc arc3"></div>

    <div class="topbar">
      <button class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24">
          <path d="M4 6H20"></path>
          <path d="M4 12H20"></path>
          <path d="M4 18H20"></path>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="logo-box">
        <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#dff6ff"/>
              <stop offset="46%" stop-color="#8fd0ff"/>
              <stop offset="100%" stop-color="#6678ff"/>
            </linearGradient>
            <radialGradient id="dotg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#a9deff"/>
              <stop offset="100%" stop-color="#6ea7ff"/>
            </radialGradient>
          </defs>
          <path d="M110 10L190 230H158L110 95L62 230H30L110 10Z" fill="url(#g1)"/>
          <path d="M110 95L156 190H136L110 132L84 190H64L110 95Z" fill="#102457" opacity=".9"/>
          <circle cx="110" cy="98" r="12" fill="url(#dotg)"/>
        </svg>
      </div>

      <div class="brand">AION</div>
      <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

      <div class="enter">
        <span>ENTER SYSTEM</span>
        <span>→</span>
      </div>
    </section>

    <section class="card">
      <div class="card-title">BIO TIME</div>
      <div class="biotime">8.4</div>
      <div class="wave">
        <svg viewBox="0 0 600 120" preserveAspectRatio="none">
          <path d="M0,86 C60,102 112,105 165,93 C220,81 272,55 332,52 C392,49 450,77 508,79 C544,80 574,73 600,60"></path>
        </svg>
      </div>
    </section>

    <div class="domain">app.aion-live.com</div>

    <nav class="nav">
      <div class="nav-item" aria-label="Home">
        <svg viewBox="0 0 24 24">
          <path d="M4 11.5L12 5L20 11.5"></path>
          <path d="M6.5 10.8V19H17.5V10.8"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="History">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8"></circle>
          <path d="M12 7.5V12L15.5 14"></path>
        </svg>
      </div>

      <div class="nav-center" aria-label="Center">
        <svg class="mini" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#dff6ff"/>
              <stop offset="46%" stop-color="#8fd0ff"/>
              <stop offset="100%" stop-color="#6678ff"/>
            </linearGradient>
            <radialGradient id="dotg2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#a9deff"/>
              <stop offset="100%" stop-color="#6ea7ff"/>
            </radialGradient>
          </defs>
          <path d="M110 10L190 230H158L110 95L62 230H30L110 10Z" fill="url(#g2)"/>
          <path d="M110 95L156 190H136L110 132L84 190H64L110 95Z" fill="#102457" opacity=".9"/>
          <circle cx="110" cy="98" r="12" fill="url(#dotg2)"/>
        </svg>
      </div>

      <div class="nav-item" aria-label="Wave">
        <svg viewBox="0 0 24 24">
          <path d="M2 13h4l2-5 3 10 2-6 2 3h7"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </div>
    </nav>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#040b22"); } catch(e) {}
      try { tg.setBackgroundColor("#040b22"); } catch(e) {}
    }
  </script>
</body>
</html>
