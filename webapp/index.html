<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AION · Biological Upgrade</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Fonts для красивого шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d10;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            /* Плавный переход для фона, если используем тему Telegram */
            background: var(--tg-theme-bg-color, #0b0d10);
            color: var(--tg-theme-text-color, #fff);
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 196, 0.1) inset;
            border: 1px solid rgba(0, 255, 196, 0.15);
        }

        /* Время */
        .time {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 48px;
            text-transform: uppercase;
        }

        /* Главный заголовок AION */
        .main-title {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #a0f0ea 0%, #4affd8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(74, 255, 216, 0.3);
            letter-spacing: -1px;
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            border-left: 3px solid #4affd8;
            padding-left: 12px;
        }

        /* Кнопка входа */
        .enter-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(74, 255, 216, 0.3);
            border-radius: 60px;
            padding: 16px 24px;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .enter-button:hover {
            background: rgba(74, 255, 216, 0.1);
            border-color: #4affd8;
            box-shadow: 0 0 20px rgba(74, 255, 216, 0.3);
            transform: scale(1.02);
        }

        .enter-button span {
            color: #4affd8;
            font-size: 24px;
            margin-left: 8px;
        }

        /* Блок BIO TIME */
        .bio-time {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 16px 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bio-time-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .bio-time-value {
            font-size: 32px;
            font-weight: 700;
            color: #4affd8;
            text-shadow: 0 0 15px #4affd8;
        }

        /* Нижняя строка с сайтом */
        .site-link {
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
            text-transform: lowercase;
        }

        /* Адаптация под тёмную тему Telegram (если используется) */
        .tg-theme {
            background: var(--tg-theme-bg-color, #0b0d10);
            color: var(--tg-theme-text-color, #fff);
        }

        /* Просто дополнительные штрихи */
        .glow {
            position: relative;
        }
        .glow::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(74,255,216,0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Время 17:00 (статичное, можно заменить на динамическое) -->
        <div class="time">17:00</div>

        <!-- Основной контент -->
        <div class="main-title">AION</div>
        <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

        <!-- Кнопка ENTER SYSTEM → -->
        <button class="enter-button" id="enterSystemBtn">
            ENTER SYSTEM
            <span>→</span>
        </button>

        <!-- Блок BIO TIME 8.4 -->
        <div class="bio-time">
            <span class="bio-time-label">BIO TIME</span>
            <span class="bio-time-value">8.4</span>
        </div>

        <!-- Ссылка на сайт (просто текст, без активной ссылки) -->
        <div class="site-link">app.aion-live.com</div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;

        // Сообщаем, что приложение готово к отображению
        tg.ready();

        // Расширяем на всю высоту (убираем серую полосу сверху)
        tg.expand();

        // Можно использовать основную кнопку Telegram вместо кастомной, но здесь оставим кастомную
        // Если нужно отправить данные боту при нажатии на кнопку "ENTER SYSTEM"
        document.getElementById('enterSystemBtn').addEventListener('click', () => {
            // Пример отправки данных боту (закрывает мини-приложение и отправляет строку)
            // tg.sendData('enter_system');
            // Если не нужно отправлять, а просто перейти на следующий экран (внутри мини-приложения),
            // можно пока просто показать уведомление или изменить контент.
            // Например, можно имитировать переход на экран 2:
            alert('Переход на экран 2 (заглушка). В реальном приложении здесь будет навигация.');
            
            // Для отправки данных используйте:
            // tg.sendData('user_wants_to_enter');
        });

        // Дополнительно: можно использовать главную кнопку Telegram
        // tg.MainButton.setText('Войти');
        // tg.MainButton.onClick(() => tg.sendData('enter'));
        // tg.MainButton.show();
        // Но в данном дизайне кнопка уже есть, поэтому не будем путать пользователя.
    </script>
</body>
</html>
