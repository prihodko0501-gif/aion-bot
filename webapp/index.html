<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background-color: #020814;
      background-image: url("static/icons/IMG_1510.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .tap {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
    }

    .tap-menu {
      right: 4%;
      top: 3%;
      width: 13%;
      height: 6%;
    }

    .tap-enter {
      left: 14%;
      top: 39%;
      width: 72%;
      height: 7%;
      border-radius: 999px;
    }

    .tap-bio {
      left: 9%;
      top: 49%;
      width: 82%;
      height: 19%;
      border-radius: 30px;
    }

    .tap-home {
      left: 10%;
      bottom: 18%;
      width: 10%;
      height: 5.2%;
      border-radius: 50%;
    }

    .tap-history {
      left: 27%;
      bottom: 18%;
      width: 10%;
      height: 5.2%;
      border-radius: 50%;
    }

    .tap-center {
      left: 40.5%;
      bottom: 15.8%;
      width: 19%;
      height: 9%;
      border-radius: 50%;
    }

    .tap-wave {
      left: 64%;
      bottom: 18%;
      width: 10%;
      height: 5.2%;
      border-radius: 50%;
    }

    .tap-profile {
      left: 81%;
      bottom: 18%;
      width: 10%;
      height: 5.2%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="screen">
    <button class="tap tap-menu" id="menuBtn" aria-label="Menu"></button>
    <button class="tap tap-enter" id="enterBtn" aria-label="Enter System"></button>
    <button class="tap tap-bio" id="bioBtn" aria-label="Bio Time"></button>

    <button class="tap tap-home" id="homeBtn" aria-label="Home"></button>
    <button class="tap tap-history" id="historyBtn" aria-label="History"></button>
    <button class="tap tap-center" id="centerBtn" aria-label="Center"></button>
    <button class="tap tap-wave" id="waveBtn" aria-label="Wave"></button>
    <button class="tap tap-profile" id="profileBtn" aria-label="Profile"></button>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    const go = (name) => {
      console.log("CLICK:", name);
    };

    document.getElementById("menuBtn").addEventListener("click", () => go("menu"));
    document.getElementById("enterBtn").addEventListener("click", () => go("enter"));
    document.getElementById("bioBtn").addEventListener("click", () => go("bio"));
    document.getElementById("homeBtn").addEventListener("click", () => go("home"));
    document.getElementById("historyBtn").addEventListener("click", () => go("history"));
    document.getElementById("centerBtn").addEventListener("click", () => go("center"));
    document.getElementById("waveBtn").addEventListener("click", () => go("wave"));
    document.getElementById("profileBtn").addEventListener("click", () => go("profile"));
  </script>
</body>
</html>
