<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg-top:#04133a;
      --bg-mid:#031028;
      --bg-bot:#01050d;
      --text:#eef5ff;
      --muted:rgba(232,238,250,.80);
      --line:rgba(132,168,255,.18);
      --line-soft:rgba(138,214,255,.22);
      --glass1:rgba(5,14,35,.54);
      --glass2:rgba(2,8,22,.82);
      --glow:#8fd8ff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      overflow-x:hidden;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:#01050d;
    }

    body{
      background:
        radial-gradient(circle at 64% 16%, rgba(126,182,255,.16), transparent 20%),
        radial-gradient(circle at 28% 52%, rgba(79,110,255,.08), transparent 18%),
        radial-gradient(circle at 74% 80%, rgba(93,186,255,.10), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bot) 84%, #000208 100%);
    }

    .screen{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      padding:20px 20px 128px;
    }

    .space,
    .stars,
    .stars-soft,
    .mist,
    .glow-bottom{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .space::before{
      content:"";
      position:absolute;
      inset:-8%;
      background:
        radial-gradient(circle at 72% 18%, rgba(170,225,255,.14), transparent 14%),
        radial-gradient(circle at 67% 22%, rgba(110,168,255,.12), transparent 20%),
        radial-gradient(circle at 62% 28%, rgba(129,198,255,.10), transparent 18%),
        radial-gradient(circle at 18% 66%, rgba(72,100,255,.08), transparent 18%),
        radial-gradient(circle at 82% 70%, rgba(76,136,255,.08), transparent 20%);
      filter:blur(18px);
      opacity:.95;
    }

    .stars::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 10% 24%, rgba(255,255,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 86% 34%, rgba(255,255,255,.82) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 47%, rgba(255,255,255,.52) 0 2px, transparent 3px),
        radial-gradient(circle at 74% 58%, rgba(255,255,255,.45) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 70%, rgba(255,255,255,.30) 0 2px, transparent 3px),
        radial-gradient(circle at 67% 76%, rgba(255,255,255,.28) 0 2px, transparent 3px),
        radial-gradient(circle at 39% 31%, rgba(255,255,255,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 57% 44%, rgba(255,255,255,.18) 0 2px, transparent 3px);
      opacity:.98;
    }

    .stars-soft::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 37% 18%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 58% 23%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 58%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 65%, rgba(255,255,255,.15) 0 1px, transparent 2px),
        radial-gradient(circle at 64% 42%, rgba(255,255,255,.15) 0 1px, transparent 2px),
        radial-gradient(circle at 46% 34%, rgba(255,255,255,.14) 0 1px, transparent 2px),
        radial-gradient(circle at 71% 19%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 16% 40%, rgba(255,255,255,.12) 0 1px, transparent 2px);
      opacity:.72;
    }

    .arc{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(130,165,255,.10);
      pointer-events:none;
    }

    .arc1{
      width:124vw;
      height:124vw;
      right:-47vw;
      top:7vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
    }

    .arc2{
      width:98vw;
      height:98vw;
      right:-31vw;
      top:20vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
      opacity:.75;
    }

    .arc3{
      width:158vw;
      height:158vw;
      left:-31vw;
      bottom:-83vh;
      border-right-color:transparent;
      border-bottom-color:transparent;
      border-top-color:rgba(143,214,255,.22);
      box-shadow:0 -20px 44px rgba(96,182,255,.12);
    }

    .mist::before{
      content:"";
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:18%;
      height:18%;
      background:
        radial-gradient(circle at 50% 100%, rgba(108,194,255,.08), transparent 42%);
      filter:blur(18px);
    }

    .glow-bottom::before{
      content:"";
      position:absolute;
      left:-14%;
      right:-14%;
      bottom:-7%;
      height:25%;
      border-top:1px solid rgba(144,214,255,.18);
      border-radius:50%;
      box-shadow:0 -22px 48px rgba(87,178,255,.12);
      opacity:.96;
    }

    .topbar{
      position:relative;
      z-index:5;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:4px;
    }

    .icon-btn{
      width:50px;
      height:50px;
      border-radius:50%;
      border:1px solid rgba(138,166,255,.16);
      background:rgba(255,255,255,.015);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      box-shadow:
        inset 0 0 18px rgba(122,162,255,.04),
        0 0 12px rgba(80,130,255,.05);
    }

    .icon-btn svg{
      width:24px;
      height:24px;
      fill:none;
      stroke:#f4f7ff;
      stroke-width:1.8;
      opacity:.98;
    }

    .hero{
      position:relative;
      z-index:4;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-top:2px;
    }

    .logo-box{
      width:min(39vw,212px);
      max-width:212px;
      filter:
        drop-shadow(0 0 16px rgba(122,196,255,.22))
        drop-shadow(0 0 34px rgba(90,132,255,.14));
    }

    .logo-box svg{
      display:block;
      width:100%;
      height:auto;
    }

    .brand{
      margin-top:8px;
      font-size:clamp(56px,9.2vw,82px);
      line-height:1;
      letter-spacing:.14em;
      font-weight:300;
      text-shadow:0 0 8px rgba(255,255,255,.03);
    }

    .subtitle{
      margin-top:18px;
      color:var(--muted);
      font-size:clamp(10px,2.15vw,16px);
      letter-spacing:.34em;
      white-space:nowrap;
      text-shadow:0 0 8px rgba(255,255,255,.02);
    }

    .enter{
      margin-top:36px;
      width:min(72%,585px);
      min-width:275px;
      height:60px;
      border-radius:36px;
      border:1px solid rgba(127,159,255,.24);
      background:
        linear-gradient(180deg, rgba(28,54,122,.64), rgba(7,18,46,.70));
      box-shadow:
        inset 0 0 0 1px rgba(130,168,255,.03),
        0 0 24px rgba(77,142,255,.10),
        0 10px 22px rgba(0,0,0,.24);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:clamp(17px,3.2vw,23px);
      letter-spacing:.08em;
      position:relative;
      overflow:hidden;
    }

    .enter::before{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:30%;
      left:-34%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      transform:skewX(-24deg);
      animation:sweep 5s linear infinite;
      opacity:.66;
    }

    .enter::after{
      content:"";
      position:absolute;
      left:14%;
      right:14%;
      bottom:-1px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(132,214,255,.98), transparent);
      box-shadow:0 0 16px rgba(118,205,255,.48);
      opacity:.98;
    }

    @keyframes sweep{
      0%{left:-36%}
      58%{left:120%}
      100%{left:120%}
    }

    .card{
      position:relative;
      z-index:4;
      width:min(74%,620px);
      min-width:318px;
      min-height:236px;
      margin:46px auto 0;
      border-radius:31px;
      border:1px solid rgba(140,200,255,.20);
      background:linear-gradient(180deg, rgba(5,14,37,.54), rgba(2,8,22,.80));
      box-shadow:
        0 0 40px rgba(120,200,255,.12),
        inset 0 0 26px rgba(64,113,255,.05),
        0 18px 38px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 112%, rgba(82,176,255,.12), transparent 36%);
      pointer-events:none;
    }

    .card-title{
      margin-top:28px;
      text-align:center;
      color:var(--muted);
      font-size:clamp(14px,2vw,20px);
      letter-spacing:.42em;
    }

    .biotime{
      margin-top:12px;
      text-align:center;
      font-size:clamp(98px,15.8vw,154px);
      font-weight:300;
      line-height:1;
    }

    .wave{
      position:absolute;
      left:0;
      right:0;
      bottom:16px;
      height:66px;
    }

    .wave svg{
      width:100%;
      height:100%;
    }

    .wave path{
      fill:none;
      stroke:#90d8ff;
      stroke-width:3.1;
      stroke-linecap:round;
      filter:
        drop-shadow(0 0 7px rgba(125,214,255,.90))
        drop-shadow(0 0 12px rgba(78,145,255,.30));
    }

    .domain{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:88px;
      z-index:7;
      padding:10px 24px;
      border-radius:19px;
      border:1px solid rgba(139,160,255,.10);
      background:rgba(18,27,54,.66);
      color:rgba(245,248,255,.94);
      font-size:14px;
      backdrop-filter:blur(8px);
      box-shadow:0 0 18px rgba(97,160,255,.08);
    }

    .nav{
      position:fixed;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:8;
      height:66px;
      border-radius:27px;
      border:1px solid rgba(122,158,255,.13);
      background:linear-gradient(180deg, rgba(8,18,44,.84), rgba(2,8,22,.94));
      backdrop-filter:blur(14px);
      display:flex;
      align-items:center;
      justify-content:space-around;
      box-shadow:
        0 12px 24px rgba(0,0,0,.22),
        inset 0 0 18px rgba(84,128,255,.05);
    }

    .nav-item{
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .nav-item svg{
      width:26px;
      height:26px;
      stroke:#eef5ff;
      stroke-width:1.8;
      fill:none;
      opacity:.98;
    }

    .nav-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:3px;
      width:82px;
      height:82px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 34%, rgba(177,229,255,.18), rgba(90,120,255,.16) 42%, rgba(10,21,52,.95) 76%);
      box-shadow:
        0 0 0 7px rgba(97,125,255,.05),
        0 0 20px rgba(92,168,255,.20),
        inset 0 0 24px rgba(130,180,255,.10);
    }

    .nav-center .mini{
      width:36px;
      height:36px;
      filter:drop-shadow(0 0 8px rgba(127,194,255,.32));
    }

    @media (max-width:430px){
      .screen{padding:20px 20px 128px}
      .subtitle{letter-spacing:.24em}
      .enter{width:min(74%,540px);height:58px}
      .card{width:min(79%,590px);min-height:226px}
      .domain{bottom:86px}
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="space"></div>
    <div class="stars"></div>
    <div class="stars-soft"></div>
    <div class="arc arc1"></div>
    <div class="arc arc2"></div>
    <div class="arc arc3"></div>
    <div class="mist"></div>
    <div class="glow-bottom"></div>

    <div class="topbar">
      <button class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24">
          <path d="M4 6H20"></path>
          <path d="M4 12H20"></path>
          <path d="M4 18H20"></path>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="logo-box">
        <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ecfbff"/>
              <stop offset="40%" stop-color="#9bdcff"/>
              <stop offset="100%" stop-color="#6f82ff"/>
            </linearGradient>
            <radialGradient id="dotg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#bce8ff"/>
              <stop offset="100%" stop-color="#81b0ff"/>
            </radialGradient>
          </defs>
          <path d="M110 8L192 232H160L110 96L60 232H28L110 8Z" fill="url(#g1)"/>
          <path d="M110 98L154 188H136L110 132L84 188H66L110 98Z" fill="#11265a" opacity=".92"/>
          <circle cx="110" cy="100" r="12" fill="url(#dotg)"/>
        </svg>
      </div>

      <div class="brand">AION</div>
      <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

      <div class="enter">
        <span>ENTER SYSTEM</span>
        <span>→</span>
      </div>
    </section>

    <section class="card">
      <div class="card-title">BIO TIME</div>
      <div class="biotime">8.4</div>
      <div class="wave">
        <svg viewBox="0 0 600 120" preserveAspectRatio="none">
          <path d="M0,90 C58,102 110,104 164,94 C220,83 272,60 330,58 C388,56 448,78 505,82 C541,84 573,79 600,68"></path>
        </svg>
      </div>
    </section>

    <div class="domain">app.aion-live.com</div>

    <nav class="nav">
      <div class="nav-item" aria-label="Home">
        <svg viewBox="0 0 24 24">
          <path d="M4 11.5L12 5L20 11.5"></path>
          <path d="M6.5 10.8V19H17.5V10.8"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="History">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8"></circle>
          <path d="M12 7.5V12L15.5 14"></path>
        </svg>
      </div>

      <div class="nav-center" aria-label="Center">
        <svg class="mini" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ecfbff"/>
              <stop offset="40%" stop-color="#9bdcff"/>
              <stop offset="100%" stop-color="#6f82ff"/>
            </linearGradient>
            <radialGradient id="dotg2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#bce8ff"/>
              <stop offset="100%" stop-color="#81b0ff"/>
            </radialGradient>
          </defs>
          <path d="M110 8L192 232H160L110 96L60 232H28L110 8Z" fill="url(#g2)"/>
          <path d="M110 98L154 188H136L110 132L84 188H66L110 98Z" fill="#11265a" opacity=".92"/>
          <circle cx="110" cy="100" r="12" fill="url(#dotg2)"/>
        </svg>
      </div>

      <div class="nav-item" aria-label="Wave">
        <svg viewBox="0 0 24 24">
          <path d="M2 13h4l2-5 3 10 2-6 2 3h7"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </div>
    </nav>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#041029"); } catch(e) {}
      try { tg.setBackgroundColor("#041029"); } catch(e) {}
    }
  </script>
</body>
</html>
