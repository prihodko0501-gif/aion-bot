<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AION</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
overflow-x:hidden;
}

.container{
padding:20px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.icon{
width:50px;
height:50px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
}

.icon img{
width:28px;
}

.logo{
margin-top:40px;
}

.logo img{
width:140px;
}

.title{
font-size:36px;
letter-spacing:12px;
margin-top:20px;
}

.subtitle{
letter-spacing:8px;
opacity:0.7;
margin-top:10px;
}

.enter{
margin-top:40px;
padding:22px;
border-radius:40px;
background:linear-gradient(180deg,#1e3a8a,#020617);
border:1px solid rgba(255,255,255,0.2);
font-size:20px;
}

.card{
margin-top:40px;
padding:40px;
border-radius:30px;
background:rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
}

.biotime{
font-size:120px;
font-weight:200;
}

.wave{
margin-top:20px;
}

.wave img{
width:100%;
opacity:0.8;
}

.bottom{
position:fixed;
bottom:20px;
left:20px;
right:20px;
height:80px;
background:rgba(0,0,0,0.6);
border-radius:30px;
display:flex;
align-items:center;
justify-content:space-around;
border:1px solid rgba(255,255,255,0.1);
}

.bottom img{
width:26px;
}

.center{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
}

.center img{
width:45px;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<div class="icon">
<img src="static/icons/menu.png">
</div>

<div class="icon">
<img src="static/icons/profile.png">
</div>

</div>


<div class="logo">
<img src="static/icons/aion.png">
</div>

<div class="title">
AION
</div>

<div class="subtitle">
BIOLOGICAL UPGRADE SYSTEM
</div>

<div class="enter">
ENTER SYSTEM →
</div>


<div class="card">

<div style="letter-spacing:10px;margin-bottom:20px;">
BIO TIME
</div>

<div class="biotime">
8.4
</div>

<div class="wave">
<img src="static/icons/wave.png">
</div>

</div>

</div>


<div class="bottom">

<img src="static/icons/home.png">

<img src="static/icons/time.png">

<div class="center">
<img src="static/icons/a.png">
</div>

<img src="static/icons/health.png">

<img src="static/icons/profile.png">

</div>


<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

tg.setHeaderColor("#020617");
tg.setBackgroundColor("#020617");

</script>

</body>
</html>
