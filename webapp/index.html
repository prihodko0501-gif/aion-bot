<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AION</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
overflow-x:hidden;
}

.container{
padding:20px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.logo{
font-size:120px;
font-weight:300;
letter-spacing:20px;
margin-top:40px;
}

.subtitle{
letter-spacing:8px;
opacity:0.7;
margin-bottom:40px;
}

.enter{
margin-top:30px;
padding:20px;
border-radius:40px;
background:linear-gradient(180deg,#1e3a8a,#020617);
border:1px solid rgba(255,255,255,0.2);
font-size:20px;
}

.card{
margin-top:40px;
padding:40px;
border-radius:30px;
background:rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
}

.biotime{
font-size:120px;
font-weight:200;
}

.bottom{
position:fixed;
bottom:20px;
left:20px;
right:20px;
height:80px;
background:rgba(0,0,0,0.6);
border-radius:30px;
display:flex;
align-items:center;
justify-content:space-around;
border:1px solid rgba(255,255,255,0.1);
}

.bottom div{
font-size:22px;
}

.center{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">
<div class="icon">≡</div>
<div class="icon">●</div>
</div>

<div class="logo">A</div>

<div style="font-size:40px;letter-spacing:15px;">AION</div>

<div class="subtitle">
BIOLOGICAL UPGRADE SYSTEM
</div>

<div class="enter">
ENTER SYSTEM →
</div>

<div class="card">

<div style="letter-spacing:10px;margin-bottom:20px;">
BIO TIME
</div>

<div class="biotime">
8.4
</div>

</div>

</div>

<div class="bottom">

<div>⌂</div>
<div>⟳</div>

<div class="center">
A
</div>

<div>≈</div>
<div>•</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

tg.setHeaderColor("#020617");
tg.setBackgroundColor("#020617");

</script>

</body>
</html>
