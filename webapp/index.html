<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AION · Biological Upgrade</title>
    <!-- Обязательно подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Шрифт Inter (опционально) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0d10;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            /* поддерживаем тему Telegram */
            background: var(--tg-theme-bg-color, #0b0d10);
            color: var(--tg-theme-text-color, #fff);
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 196, 0.1) inset;
            border: 1px solid rgba(0, 255, 196, 0.15);
        }

        /* Время (как на картинке — 17:00) */
        .time {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 48px;
            text-transform: uppercase;
        }

        /* Заголовок AION */
        .main-title {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #a0f0ea 0%, #4affd8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(74, 255, 216, 0.3);
            letter-spacing: -1px;
        }

        /* Подзаголовок BIOLOGICAL UPGRADE SYSTEM */
        .subtitle {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            border-left: 3px solid #4affd8;
            padding-left: 12px;
        }

        /* Кнопка ENTER SYSTEM → */
        .enter-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(74, 255, 216, 0.3);
            border-radius: 60px;
            padding: 16px 24px;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .enter-button:hover {
            background: rgba(74, 255, 216, 0.1);
            border-color: #4affd8;
            box-shadow: 0 0 20px rgba(74, 255, 216, 0.3);
            transform: scale(1.02);
        }

        .enter-button span {
            color: #4affd8;
            font-size: 24px;
            margin-left: 8px;
        }

        /* Блок BIO TIME 8.4 */
        .bio-time {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 16px 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bio-time-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .bio-time-value {
            font-size: 32px;
            font-weight: 700;
            color: #4affd8;
            text-shadow: 0 0 15px #4affd8;
        }

        /* Нижняя строка с сайтом */
        .site-link {
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Время 17:00 (как на скриншоте) -->
        <div class="time">17:00</div>

        <!-- AION -->
        <div class="main-title">AION</div>
        <!-- BIOLOGICAL UPGRADE SYSTEM (с пробелами, как на картинке) -->
        <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

        <!-- Кнопка ENTER SYSTEM → -->
        <button class="enter-button" id="enterSystemBtn">
            ENTER SYSTEM
            <span>→</span>
        </button>

        <!-- BIO TIME 8.4 -->
        <div class="bio-time">
            <span class="bio-time-label">BIO TIME</span>
            <span class="bio-time-value">8.4</span>
        </div>

        <!-- Ссылка на сайт (просто текст, не кликабельный) -->
        <div class="site-link">app.aion-live.com</div>
    </div>

    <script>
        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();          // сообщаем Telegram, что приложение загружено
        tg.expand();         // растягиваем на весь экран (без шапки)

        // Обработка нажатия на кнопку "ENTER SYSTEM"
        document.getElementById('enterSystemBtn').addEventListener('click', () => {
            // Здесь вы можете описать, что должно произойти при нажатии.
            // Например, отправить данные боту и закрыть окно:
            // tg.sendData('enter_system');
            
            // Или просто показать всплывающее сообщение (заглушка):
            tg.showAlert('Переход на второй экран');
            
            // Если нужно использовать главную кнопку Telegram, можно добавить:
            // tg.MainButton.setText('ДАЛЕЕ');
            // tg.MainButton.show();
        });

        // Подстраиваемся под смену темы Telegram (светлая/тёмная)
        tg.onEvent('themeChanged', function() {
            document.body.style.background = tg.themeParams.bg_color;
        });
    </script>
</body>
</html>
