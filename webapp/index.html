<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background-color: #020814;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .tap {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    #screen1 {
      background-image: url("/screen-1");
    }

    .s1-enter {
      left: 18%;
      top: 39%;
      width: 64%;
      height: 7%;
      border-radius: 999px;
    }

    .s1-home {
      left: 17%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-history {
      left: 33%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-center {
      left: 45%;
      bottom: 16.8%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s1-wave {
      left: 63%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-profile {
      left: 79%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    #screen2 {
      background-image: url("/screen-2");
    }

    .s2-menu {
      left: 10%;
      top: 12%;
      width: 8%;
      height: 5%;
    }

    .s2-sleep {
      left: 14%;
      top: 36%;
      width: 34%;
      height: 12%;
      border-radius: 20px;
    }

    .s2-stress {
      left: 52%;
      top: 36%;
      width: 34%;
      height: 12%;
      border-radius: 20px;
    }

    .s2-recovery {
      left: 14%;
      top: 50.5%;
      width: 34%;
      height: 12%;
      border-radius: 20px;
    }

    .s2-longevity {
      left: 52%;
      top: 50.5%;
      width: 34%;
      height: 12%;
      border-radius: 20px;
    }

    .s2-home {
      left: 16%;
      bottom: 12%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-history {
      left: 33%;
      bottom: 12%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-center {
      left: 45%;
      bottom: 9.5%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s2-wave {
      left: 63%;
      bottom: 12%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-profile {
      left: 79%;
      bottom: 12%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    #screen3 {
      background-image: url("/screen-3");
    }

    .s3-back {
      left: 9%;
      top: 11%;
      width: 18%;
      height: 5%;
    }

    .s3-profile {
      right: 10%;
      top: 11%;
      width: 10%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-analysis {
      left: 18%;
      bottom: 11%;
      width: 64%;
      height: 6.5%;
      border-radius: 999px;
    }

    .s3-home {
      left: 13%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-history {
      left: 31%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-center {
      left: 45%;
      bottom: 1%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s3-wave {
      left: 63%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-profile-bottom {
      left: 81%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen1">
    <button class="tap s1-enter" id="goScreen2"></button>
    <button class="tap s1-home"></button>
    <button class="tap s1-history"></button>
    <button class="tap s1-center"></button>
    <button class="tap s1-wave"></button>
    <button class="tap s1-profile"></button>
  </div>

  <div class="screen hidden" id="screen2">
    <button class="tap s2-menu"></button>
    <button class="tap s2-sleep" id="goScreen3"></button>
    <button class="tap s2-stress"></button>
    <button class="tap s2-recovery"></button>
    <button class="tap s2-longevity"></button>

    <button class="tap s2-home" id="backToScreen1From2"></button>
    <button class="tap s2-history"></button>
    <button class="tap s2-center"></button>
    <button class="tap s2-wave"></button>
    <button class="tap s2-profile"></button>
  </div>

  <div class="screen hidden" id="screen3">
    <button class="tap s3-back" id="backToScreen2"></button>
    <button class="tap s3-profile"></button>
    <button class="tap s3-analysis"></button>

    <button class="tap s3-home" id="backToScreen1From3"></button>
    <button class="tap s3-history"></button>
    <button class="tap s3-center" id="backToScreen2Center"></button>
    <button class="tap s3-wave"></button>
    <button class="tap s3-profile-bottom"></button>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      try {
        tg.setHeaderColor("#020814");
        tg.setBackgroundColor("#020814");
      } catch (e) {
        console.log("Telegram theme set skipped");
      }
    }

    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const screen3 = document.getElementById("screen3");

    function showScreen(n) {
      screen1.classList.add("hidden");
      screen2.classList.add("hidden");
      screen3.classList.add("hidden");

      if (n === 1) screen1.classList.remove("hidden");
      if (n === 2) screen2.classList.remove("hidden");
      if (n === 3) screen3.classList.remove("hidden");
    }

    document.getElementById("goScreen2").addEventListener("click", () => showScreen(2));
    document.getElementById("goScreen3").addEventListener("click", () => showScreen(3));

    document.getElementById("backToScreen2").addEventListener("click", () => showScreen(2));
    document.getElementById("backToScreen2Center").addEventListener("click", () => showScreen(2));

    document.getElementById("backToScreen1From2").addEventListener("click", () => showScreen(1));
    document.getElementById("backToScreen1From3").addEventListener("click", () => showScreen(1));
  </script>
</body>
</html>
