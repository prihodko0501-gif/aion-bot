<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg-top:#071741;
      --bg-mid:#041029;
      --bg-bot:#020611;
      --text:#eef4ff;
      --muted:rgba(229,236,250,.76);
      --line:rgba(129,161,255,.14);
      --line-soft:rgba(140,200,255,.16);
      --glass1:rgba(5,14,35,.50);
      --glass2:rgba(2,8,22,.76);
      --glow:#84cfff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:#020611;
      overflow-x:hidden;
    }

    body{
      background:
        radial-gradient(circle at 50% 10%, rgba(56,102,255,.13), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(80,180,255,.10), transparent 28%),
        linear-gradient(180deg,var(--bg-top) 0%, var(--bg-mid) 38%, var(--bg-bot) 80%, #01030a 100%);
    }

    .screen{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      padding:22px 20px 136px;
    }

    .nebula,
    .stars,
    .stars2,
    .stars3,
    .fog{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .nebula::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 66% 18%, rgba(119,180,255,.12), transparent 20%),
        radial-gradient(circle at 28% 48%, rgba(86,123,255,.08), transparent 18%),
        radial-gradient(circle at 70% 72%, rgba(77,147,255,.06), transparent 22%);
      filter:blur(18px);
      opacity:.9;
    }

    .stars::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 10% 25%, rgba(255,255,255,.86) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 31%, rgba(255,255,255,.70) 0 2px, transparent 3px),
        radial-gradient(circle at 17% 46%, rgba(255,255,255,.46) 0 2px, transparent 3px),
        radial-gradient(circle at 74% 56%, rgba(255,255,255,.40) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 70%, rgba(255,255,255,.26) 0 2px, transparent 3px),
        radial-gradient(circle at 67% 77%, rgba(255,255,255,.22) 0 2px, transparent 3px);
      opacity:.92;
    }

    .stars2::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 35% 17%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 58% 23%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 58%, rgba(255,255,255,.16) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 65%, rgba(255,255,255,.14) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 41%, rgba(255,255,255,.14) 0 1px, transparent 2px);
      opacity:.72;
    }

    .arc{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(130,162,255,.08);
      pointer-events:none;
    }

    .arc1{
      width:126vw;
      height:126vw;
      right:-48vw;
      top:8vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
    }

    .arc2{
      width:98vw;
      height:98vw;
      right:-31vw;
      top:20vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
      opacity:.72;
    }

    .arc3{
      width:154vw;
      height:154vw;
      left:-28vw;
      bottom:-82vh;
      border-right-color:transparent;
      border-bottom-color:transparent;
      border-top-color:rgba(135,205,255,.18);
      box-shadow:0 -14px 34px rgba(89,179,255,.10);
    }

    .fog::before{
      content:"";
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:-6%;
      height:24%;
      border-top:1px solid rgba(144,210,255,.18);
      border-radius:50%;
      box-shadow:0 -18px 40px rgba(79,171,255,.10);
      opacity:.95;
    }

    .topbar{
      position:relative;
      z-index:5;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }

    .icon-btn{
      width:46px;
      height:46px;
      border-radius:50%;
      border:1px solid rgba(139,168,255,.14);
      background:rgba(255,255,255,.015);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 18px rgba(110,145,255,.04);
    }

    .icon-btn svg{
      width:23px;
      height:23px;
      fill:none;
      stroke:#f3f7ff;
      stroke-width:1.8;
      opacity:.96;
    }

    .hero{
      position:relative;
      z-index:4;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-top:4px;
    }

    .logo-box{
      width:min(36vw,192px);
      max-width:192px;
      filter:
        drop-shadow(0 0 10px rgba(116,194,255,.16))
        drop-shadow(0 0 22px rgba(82,122,255,.08));
    }

    .logo-box svg{
      display:block;
      width:100%;
      height:auto;
    }

    .brand{
      margin-top:6px;
      font-size:clamp(54px,9vw,78px);
      line-height:1;
      letter-spacing:.14em;
      font-weight:300;
    }

    .subtitle{
      margin-top:16px;
      color:var(--muted);
      font-size:clamp(10px,2.15vw,16px);
      letter-spacing:.34em;
      white-space:nowrap;
    }

    .enter{
      margin-top:34px;
      width:min(68%,550px);
      min-width:260px;
      height:58px;
      border-radius:34px;
      border:1px solid rgba(127,159,255,.20);
      background:linear-gradient(180deg, rgba(25,50,117,.52), rgba(8,18,45,.58));
      box-shadow:
        inset 0 0 0 1px rgba(130,168,255,.02),
        0 0 16px rgba(77,142,255,.07),
        0 10px 20px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:clamp(16px,3.1vw,22px);
      letter-spacing:.08em;
      position:relative;
    }

    .enter::after{
      content:"";
      position:absolute;
      left:15%;
      right:15%;
      bottom:-1px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(132,214,255,.90), transparent);
      box-shadow:0 0 12px rgba(118,205,255,.38);
      opacity:.9;
    }

    .enter span:last-child{
      font-size:1.14em;
    }

    .card{
      position:relative;
      z-index:4;
      width:min(72%,600px);
      min-width:300px;
      min-height:220px;
      margin:36px auto 0;
      border-radius:28px;
      border:1px solid rgba(124,160,255,.12);
      background:linear-gradient(180deg, rgba(5,14,37,.48), rgba(2,8,22,.72));
      box-shadow:
        inset 0 0 24px rgba(64,113,255,.04),
        0 18px 36px rgba(0,0,0,.24);
      overflow:hidden;
    }

    .card-title{
      margin-top:28px;
      text-align:center;
      color:var(--muted);
      font-size:clamp(14px,2vw,20px);
      letter-spacing:.40em;
    }

    .biotime{
      margin-top:16px;
      text-align:center;
      font-size:clamp(82px,14vw,138px);
      font-weight:300;
      line-height:1;
    }

    .wave{
      position:absolute;
      left:0;
      right:0;
      bottom:12px;
      height:62px;
    }

    .wave svg{
      width:100%;
      height:100%;
    }

    .wave path{
      fill:none;
      stroke:#86d3ff;
      stroke-width:4;
      stroke-linecap:round;
      filter:
        drop-shadow(0 0 7px rgba(125,214,255,.82))
        drop-shadow(0 0 10px rgba(78,145,255,.30));
    }

    .nav{
      position:fixed;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:8;
      height:62px;
      border-radius:26px;
      border:1px solid rgba(122,158,255,.12);
      background:linear-gradient(180deg, rgba(8,18,44,.82), rgba(2,8,22,.93));
      backdrop-filter:blur(14px);
      display:flex;
      align-items:center;
      justify-content:space-around;
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        inset 0 0 18px rgba(84,128,255,.05);
    }

    .nav-item{
      width:48px;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .nav-item svg{
      width:26px;
      height:26px;
      stroke:#eef5ff;
      stroke-width:1.8;
      fill:none;
      opacity:.98;
    }

    .nav-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:4px;
      width:76px;
      height:76px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 34%, rgba(177,229,255,.18), rgba(90,120,255,.16) 42%, rgba(10,21,52,.95) 76%);
      box-shadow:
        0 0 0 6px rgba(97,125,255,.05),
        0 0 16px rgba(92,168,255,.18),
        inset 0 0 24px rgba(130,180,255,.10);
    }

    .nav-center .mini{
      width:34px;
      height:34px;
      filter:drop-shadow(0 0 7px rgba(127,194,255,.30));
    }

    .domain{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:88px;
      z-index:7;
      padding:9px 22px;
      border-radius:18px;
      border:1px solid rgba(139,160,255,.10);
      background:rgba(18,27,54,.64);
      color:rgba(245,248,255,.92);
      font-size:14px;
      backdrop-filter:blur(8px);
    }

    @media (max-width:430px){
      .screen{padding:20px 20px 128px}
      .subtitle{letter-spacing:.24em}
      .enter{width:min(72%,520px);height:56px}
      .card{width:min(78%,580px);min-height:210px}
      .domain{bottom:84px}
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="nebula"></div>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    <div class="arc arc1"></div>
    <div class="arc arc2"></div>
    <div class="arc arc3"></div>
    <div class="fog"></div>

    <div class="topbar">
      <button class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24">
          <path d="M4 6H20"></path>
          <path d="M4 12H20"></path>
          <path d="M4 18H20"></path>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="logo-box">
        <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e7f8ff"/>
              <stop offset="42%" stop-color="#97d7ff"/>
              <stop offset="100%" stop-color="#6f7dff"/>
            </linearGradient>
            <radialGradient id="dotg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#b7e4ff"/>
              <stop offset="100%" stop-color="#79abff"/>
            </radialGradient>
          </defs>
          <path d="M110 8L192 232H160L110 96L60 232H28L110 8Z" fill="url(#g1)"/>
          <path d="M110 98L154 188H136L110 132L84 188H66L110 98Z" fill="#11265a" opacity=".92"/>
          <circle cx="110" cy="100" r="12" fill="url(#dotg)"/>
        </svg>
      </div>

      <div class="brand">AION</div>
      <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

      <div class="enter">
        <span>ENTER SYSTEM</span>
        <span>→</span>
      </div>
    </section>

    <section class="card">
      <div class="card-title">BIO TIME</div>
      <div class="biotime">8.4</div>
      <div class="wave">
        <svg viewBox="0 0 600 120" preserveAspectRatio="none">
          <path d="M0,88 C58,102 110,104 164,93 C218,82 270,58 330,55 C390,52 448,78 505,82 C541,84 573,78 600,65"></path>
        </svg>
      </div>
    </section>

    <div class="domain">app.aion-live.com</div>

    <nav class="nav">
      <div class="nav-item" aria-label="Home">
        <svg viewBox="0 0 24 24">
          <path d="M4 11.5L12 5L20 11.5"></path>
          <path d="M6.5 10.8V19H17.5V10.8"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="History">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8"></circle>
          <path d="M12 7.5V12L15.5 14"></path>
        </svg>
      </div>

      <div class="nav-center" aria-label="Center">
        <svg class="mini" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e7f8ff"/>
              <stop offset="42%" stop-color="#97d7ff"/>
              <stop offset="100%" stop-color="#6f7dff"/>
            </linearGradient>
            <radialGradient id="dotg2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#b7e4ff"/>
              <stop offset="100%" stop-color="#79abff"/>
            </radialGradient>
          </defs>
          <path d="M110 8L192 232H160L110 96L60 232H28L110 8Z" fill="url(#g2)"/>
          <path d="M110 98L154 188H136L110 132L84 188H66L110 98Z" fill="#11265a" opacity=".92"/>
          <circle cx="110" cy="100" r="12" fill="url(#dotg2)"/>
        </svg>
      </div>

      <div class="nav-item" aria-label="Wave">
        <svg viewBox="0 0 24 24">
          <path d="M2 13h4l2-5 3 10 2-6 2 3h7"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </div>
    </nav>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#041029"); } catch(e) {}
      try { tg.setBackgroundColor("#041029"); } catch(e) {}
    }
  </script>
</body>
</html>
