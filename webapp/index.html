<script>
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    try {
      tg.setHeaderColor("#020814");
      tg.setBackgroundColor("#020814");
      document.documentElement.style.background = "#020814";
      document.body.style.background = "#020814";
    } catch (e) {
      console.log("Telegram theme set skipped");
    }
  }

  ["/screen-1", "/screen-2", "/screen-3"].forEach((src) => {
    const img = new Image();
    img.src = src;
  });

  function tapFeedback(type = "light") {
    try {
      const tg = window.Telegram?.WebApp;
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred(type);
      } else {
        console.log("HapticFeedback unavailable");
      }
    } catch (e) {
      console.log("Haptic error:", e);
    }
  }

  const screen1 = document.getElementById("screen1");
  const screen2 = document.getElementById("screen2");
  const screen3 = document.getElementById("screen3");

  function showScreen(n) {
    screen1.classList.add("hidden");
    screen2.classList.add("hidden");
    screen3.classList.add("hidden");

    if (n === 1) screen1.classList.remove("hidden");
    if (n === 2) screen2.classList.remove("hidden");
    if (n === 3) screen3.classList.remove("hidden");
  }

  function bindClick(id, handler, haptic = "light") {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("click", () => {
      tapFeedback(haptic);
      handler();
    });
  }

  // Главные кнопки
  bindClick("goScreen2", () => showScreen(2), "heavy");
  bindClick("goScreen3", () => showScreen(3), "heavy");
  bindClick("repeatAnalysis", () => showScreen(3), "heavy");

  // Назад / home / center
  bindClick("backToScreen2", () => showScreen(2), "medium");
  bindClick("backToScreen2Center", () => showScreen(2), "medium");
  bindClick("backToScreen1From2", () => showScreen(1), "medium");
  bindClick("backToScreen1From3", () => showScreen(1), "medium");

  bindClick("s1Home", () => showScreen(1), "medium");
  bindClick("s1Center", () => showScreen(2), "medium");
  bindClick("s2Center", () => showScreen(2), "medium");

  bindClick("s3History", () => showScreen(3), "light");
  bindClick("s3Wave", () => showScreen(3), "light");

  // Заглушки
  [
    "s1History", "s1Wave", "s1Profile",
    "s2Menu", "s2History", "s2Wave", "s2Profile",
    "s3ProfileTop", "s3ProfileBottom"
  ].forEach((id) => {
    bindClick(id, () => console.log("click:", id), "light");
  });

  console.log("Telegram:", !!window.Telegram);
  console.log("WebApp:", !!window.Telegram?.WebApp);
  console.log("Haptic:", !!window.Telegram?.WebApp?.HapticFeedback);
</script>
