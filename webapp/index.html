<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>AION</title>
  <style>
    :root {
      --bg-top: #020815;
      --bg-mid: #040b1b;
      --bg-bottom: #071229;

      --line: rgba(162, 214, 255, 0.72);
      --line-soft: rgba(116, 186, 255, 0.34);
      --text: #eef6ff;
      --text-soft: rgba(227, 240, 255, 0.9);
      --blue: #66c8ff;
      --blue-2: #2f7dff;
      --glow: rgba(73, 190, 255, 0.55);
      --glow-soft: rgba(73, 190, 255, 0.18);
      --card-bg: rgba(5, 11, 28, 0.52);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #010612;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 78%, rgba(87, 190, 255, 0.10), transparent 18%),
        radial-gradient(circle at 50% 52%, rgba(53, 147, 255, 0.08), transparent 16%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
    }

    /* Общий фон */
    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 34%, rgba(98, 183, 255, 0.05), transparent 13%),
        radial-gradient(circle at 68% 22%, rgba(67, 159, 255, 0.08), transparent 10%);
      opacity: 0.9;
    }

    .screen {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 22px 34px;
      min-height: 100vh;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      font-size: 14px;
      color: #ffffff;
      letter-spacing: 0.04em;
    }

    .menu-btn {
      width: 34px;
      height: 24px;
      position: relative;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .menu-btn span {
      position: absolute;
      right: 0;
      width: 26px;
      height: 2px;
      border-radius: 999px;
      background: rgba(137, 212, 255, 0.95);
      box-shadow: 0 0 10px rgba(96, 195, 255, 0.55);
    }

    .menu-btn span:nth-child(1) { top: 2px; }
    .menu-btn span:nth-child(2) { top: 10px; }
    .menu-btn span:nth-child(3) { top: 18px; }

    .logo-box {
      position: relative;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      border-radius: 18px;
      background: radial-gradient(circle, rgba(77, 191, 255, 0.22), transparent 65%);
      filter: blur(14px);
      pointer-events: none;
    }

    .logo-img {
      position: relative;
      display: block;
      width: 150px;
      max-width: 44vw;
      object-fit: contain;
      filter:
        drop-shadow(0 0 12px rgba(88, 194, 255, 0.22))
        drop-shadow(0 0 28px rgba(72, 151, 255, 0.12));
    }

    .brand {
      margin: 10px 0 0;
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.34em;
      color: #f3f7fc;
      text-indent: 0.34em;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(232, 240, 250, 0.95);
      text-align: center;
      white-space: nowrap;
    }

    .enter-wrap {
      position: relative;
      width: 100%;
      margin-top: 26px;
      display: flex;
      justify-content: center;
    }

    .enter-wrap::before {
      content: "";
      position: absolute;
      width: 130px;
      height: 70px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(87, 197, 255, 0.22), transparent 68%);
      filter: blur(18px);
      pointer-events: none;
    }

    .enter-btn {
      position: relative;
      width: min(100%, 318px);
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(121, 214, 255, 0.92);
      background:
        linear-gradient(180deg, rgba(7, 16, 35, 0.64), rgba(5, 12, 28, 0.9));
      box-shadow:
        0 0 12px rgba(92, 200, 255, 0.26),
        inset 0 0 18px rgba(75, 176, 255, 0.08);
      color: #f4f8ff;
      font-size: 16px;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      cursor: pointer;
    }

    .enter-btn .arrow {
      font-size: 28px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .bio-card-wrap {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 26px;
    }

    /* Мягкий вертикальный glow над центральной кнопкой A */
    .bio-card-wrap::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -26px;
      transform: translateX(-50%);
      width: 50px;
      height: 230px;
      background: linear-gradient(
        180deg,
        rgba(109, 203, 255, 0.16) 0%,
        rgba(109, 203, 255, 0.10) 45%,
        rgba(109, 203, 255, 0.02) 100%
      );
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
    }

    .bio-card {
      position: relative;
      z-index: 1;
      width: min(100%, 356px);
      min-height: 176px;
      border-radius: 32px;
      border: 1px solid rgba(237, 245, 255, 0.9);
      background:
        linear-gradient(180deg, rgba(5, 11, 24, 0.54), rgba(6, 10, 24, 0.78));
      box-shadow:
        inset 0 0 20px rgba(91, 188, 255, 0.05),
        0 0 12px rgba(88, 191, 255, 0.08);
      overflow: hidden;
      padding: 18px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bio-label {
      font-size: 13px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(232, 240, 250, 0.95);
      text-indent: 0.34em;
      margin-top: 2px;
    }

    .bio-value {
      margin-top: 16px;
      font-size: 82px;
      line-height: 0.95;
      font-weight: 300;
      color: #f7fbff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.04);
    }

    .wave {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 14px;
      height: 54px;
      pointer-events: none;
    }

    .wave svg {
      width: 100%;
      height: 100%;
      display: block;
      filter:
        drop-shadow(0 0 6px rgba(86, 188, 255, 0.55))
        drop-shadow(0 0 16px rgba(86, 188, 255, 0.25));
    }

    .nav-wrap {
      position: relative;
      width: 100%;
      margin-top: 22px;
      display: flex;
      justify-content: center;
      padding-bottom: 36px;
    }

    .nav {
      position: relative;
      width: min(100%, 374px);
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(224, 238, 255, 0.92);
      background:
        linear-gradient(180deg, rgba(5, 12, 29, 0.52), rgba(7, 12, 28, 0.82));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      box-shadow:
        0 0 10px rgba(96, 194, 255, 0.09),
        inset 0 0 14px rgba(96, 194, 255, 0.04);
      overflow: visible;
    }

    .nav-item {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: rgba(154, 216, 255, 0.95);
      opacity: 0.95;
      z-index: 2;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px rgba(76, 187, 255, 0.24));
    }

    .nav-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(84, 190, 255, 0.34), rgba(16, 58, 126, 0.88) 62%, rgba(8, 19, 44, 0.98) 100%);
      box-shadow:
        0 0 22px rgba(75, 190, 255, 0.28),
        inset 0 0 16px rgba(112, 207, 255, 0.12);
      z-index: 3;
    }

    .nav-center::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80, 193, 255, 0.2), transparent 66%);
      filter: blur(12px);
      z-index: -1;
    }

    .nav-center img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(85, 190, 255, 0.22));
    }

    .domain {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.05em;
      color: rgba(240, 246, 255, 0.92);
      white-space: nowrap;
      z-index: 2;
    }

    /* Нижняя красивая растяжка */
    .bottom-light {
      position: absolute;
      left: 50%;
      bottom: -16px;
      transform: translateX(-50%);
      width: 118%;
      height: 126px;
      pointer-events: none;
      z-index: 0;
    }

    .bottom-light::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 92%;
      height: 64px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center,
        rgba(85, 187, 255, 0.26) 0%,
        rgba(85, 187, 255, 0.12) 36%,
        rgba(85, 187, 255, 0.03) 68%,
        transparent 100%);
      filter: blur(22px);
    }

    .bottom-light::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 88px;
      background:
        radial-gradient(circle at 50% 72%, rgba(144, 223, 255, 0.76), rgba(87, 187, 255, 0.18) 16%, transparent 28%);
      filter: blur(8px);
      opacity: 0.9;
    }

    .bottom-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      filter:
        drop-shadow(0 0 8px rgba(93, 198, 255, 0.45))
        drop-shadow(0 0 24px rgba(93, 198, 255, 0.16));
      opacity: 0.95;
    }

    /* Небольшие световые точки */
    .spark {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(144, 223, 255, 0.95), rgba(86, 188, 255, 0.42) 45%, transparent 72%);
      filter: blur(1px);
      pointer-events: none;
      z-index: 1;
    }

    .spark.s1 {
      width: 10px;
      height: 10px;
      top: 294px;
      right: 68px;
      opacity: 0.72;
    }

    .spark.s2 {
      width: 6px;
      height: 6px;
      top: 182px;
      right: 118px;
      opacity: 0.34;
    }

    @media (max-width: 390px) {
      .brand {
        font-size: 27px;
      }

      .bio-value {
        font-size: 74px;
      }

      .subtitle,
      .bio-label {
        letter-spacing: 0.22em;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="topbar">
        <div>17:00</div>
        <button class="menu-btn" aria-label="menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="logo-box">
        <div class="logo-glow"></div>
        <!-- замени путь на свой -->
        <img class="logo-img" src="assets/aion-logo.png" alt="AION logo" />
      </div>

      <div class="brand">AION</div>
      <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>

      <div class="enter-wrap">
        <button class="enter-btn">
          <span>ENTER SYSTEM</span>
          <span class="arrow">→</span>
        </button>
      </div>

      <div class="bio-card-wrap">
        <div class="bio-card">
          <div class="bio-label">BIO TIME</div>
          <div class="bio-value">8.4</div>

          <div class="wave">
            <svg viewBox="0 0 320 56" preserveAspectRatio="none">
              <defs>
                <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2d6fff" stop-opacity="0.15"/>
                  <stop offset="18%" stop-color="#6dd8ff" stop-opacity="0.92"/>
                  <stop offset="50%" stop-color="#8be6ff" stop-opacity="1"/>
                  <stop offset="82%" stop-color="#56a8ff" stop-opacity="0.92"/>
                  <stop offset="100%" stop-color="#2d6fff" stop-opacity="0.14"/>
                </linearGradient>
              </defs>

              <path
                d="M0 42
                   C18 38, 28 25, 44 29
                   C60 33, 76 43, 94 38
                   C112 33, 128 18, 148 24
                   C170 31, 184 46, 208 39
                   C232 32, 242 17, 262 21
                   C284 26, 296 44, 320 37"
                stroke="url(#waveGrad)"
                stroke-width="4"
                fill="none"
                stroke-linecap="round"
              />
            </svg>
          </div>
        </div>
      </div>

      <div class="nav-wrap">
        <div class="nav">
          <div class="nav-item" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 10.5L12 3l9 7.5" />
              <path d="M5.5 9.5V20h13V9.5" />
            </svg>
          </div>

          <div class="nav-item" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 7v5l3.5 2" />
              <circle cx="12" cy="12" r="8.2"></circle>
            </svg>
          </div>

          <div class="nav-center">
            <!-- замени путь на свой -->
            <img src="assets/aion-mark.png" alt="AION center" />
          </div>

          <div class="nav-item" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 14c2.2 0 2.2-4 4.4-4s2.2 8 4.4 8 2.2-10 4.4-10 2.2 6 4.4 6" />
            </svg>
          </div>

          <div class="nav-item" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="3.5"></circle>
              <path d="M5 20c1.2-3.8 4.1-5.7 7-5.7s5.8 1.9 7 5.7" />
            </svg>
          </div>
        </div>

        <div class="domain">app.aion-live.com</div>

        <div class="bottom-light">
          <svg class="bottom-svg" viewBox="0 0 430 126" preserveAspectRatio="none">
            <defs>
              <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#1a5cff" stop-opacity="0.05"/>
                <stop offset="18%" stop-color="#6dd8ff" stop-opacity="0.55"/>
                <stop offset="50%" stop-color="#e8fbff" stop-opacity="0.96"/>
                <stop offset="82%" stop-color="#60c7ff" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#1a5cff" stop-opacity="0.05"/>
              </linearGradient>
            </defs>

            <path
              d="M0 110
                 C48 98, 78 74, 112 78
                 C150 82, 178 108, 212 104
                 C248 99, 270 68, 310 72
                 C348 76, 374 104, 430 94"
              stroke="url(#bottomLine)"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <path
              d="M8 116
                 C64 92, 104 96, 156 108
                 C190 116, 232 118, 284 100
                 C332 83, 370 87, 422 110"
              stroke="url(#bottomLine)"
              stroke-width="1.3"
              fill="none"
              stroke-linecap="round"
              opacity="0.72"
            />
          </svg>
        </div>
      </div>
    </div>

    <div class="spark s1"></div>
    <div class="spark s2"></div>
  </div>
</body>
</html>
