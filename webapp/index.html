<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg-top:#0b1e4d;
      --bg-mid:#061331;
      --bg-bottom:#020713;
      --line:rgba(130,165,255,.18);
      --glass:rgba(5,14,40,.44);
      --glass-2:rgba(4,10,28,.72);
      --text:#eef5ff;
      --muted:rgba(232,239,255,.72);
      --glow:#83cbff;
      --accent:#86bfff;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      min-height:100%;
      background:#020713;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow-x:hidden;
    }

    body{
      background:
        radial-gradient(circle at 50% 12%, rgba(65,102,255,.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(95,185,255,.16), transparent 26%),
        linear-gradient(180deg,var(--bg-top) 0%, var(--bg-mid) 36%, var(--bg-bottom) 78%, #01030a 100%);
    }

    .screen{
      position:relative;
      min-height:100vh;
      padding:24px 22px 148px;
      overflow:hidden;
    }

    .stars::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 12% 26%, rgba(255,255,255,.82) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 32%, rgba(255,255,255,.62) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 48%, rgba(255,255,255,.42) 0 2px, transparent 3px),
        radial-gradient(circle at 73% 57%, rgba(255,255,255,.38) 0 2px, transparent 3px),
        radial-gradient(circle at 25% 70%, rgba(255,255,255,.28) 0 2px, transparent 3px),
        radial-gradient(circle at 65% 74%, rgba(255,255,255,.24) 0 2px, transparent 3px);
      opacity:.9;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(145,175,255,.08);
      pointer-events:none;
    }

    .orb1{
      width:122vw;
      height:122vw;
      right:-44vw;
      top:8vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
    }

    .orb2{
      width:94vw;
      height:94vw;
      right:-30vw;
      top:20vh;
      border-left-color:transparent;
      border-bottom-color:transparent;
      opacity:.7;
    }

    .bottom-orb{
      position:absolute;
      left:-12vw;
      right:-12vw;
      bottom:-12vh;
      height:28vh;
      border-top:1px solid rgba(125,205,255,.18);
      border-radius:50%;
      box-shadow:0 -10px 40px rgba(103,187,255,.12);
      pointer-events:none;
    }

    .topbar{
      position:relative;
      z-index:3;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border-radius:50%;
      border:1px solid rgba(140,170,255,.14);
      background:rgba(255,255,255,.02);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 18px rgba(120,160,255,.04);
    }

    .icon-btn svg{
      width:24px;
      height:24px;
      stroke:#f3f7ff;
      stroke-width:1.8;
      fill:none;
      opacity:.96;
    }

    .hero{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-top:12px;
    }

    .logo-wrap{
      width:min(44vw,240px);
      max-width:240px;
      filter:drop-shadow(0 0 18px rgba(124,192,255,.16));
    }

    .logo-wrap svg{display:block;width:100%;height:auto}

    .brand{
      margin-top:8px;
      font-size:clamp(56px,10vw,86px);
      letter-spacing:.14em;
      font-weight:300;
      line-height:1;
    }

    .subtitle{
      margin-top:18px;
      color:var(--muted);
      font-size:clamp(11px,2.5vw,18px);
      letter-spacing:.38em;
      white-space:nowrap;
    }

    .enter{
      margin-top:34px;
      width:min(94%,700px);
      height:74px;
      border-radius:40px;
      border:1px solid rgba(124,160,255,.22);
      background:linear-gradient(180deg, rgba(30,58,130,.56), rgba(7,18,48,.62));
      box-shadow:
        inset 0 0 0 1px rgba(130,170,255,.03),
        0 0 24px rgba(75,142,255,.10),
        0 10px 24px rgba(0,0,0,.24);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      font-size:clamp(18px,4vw,28px);
      letter-spacing:.08em;
    }

    .card{
      position:relative;
      z-index:2;
      width:min(96%,740px);
      min-height:288px;
      margin:34px auto 0;
      border-radius:34px;
      border:1px solid rgba(124,160,255,.14);
      background:linear-gradient(180deg, rgba(5,16,42,.58), rgba(2,8,24,.72));
      box-shadow:
        inset 0 0 28px rgba(61,112,255,.04),
        0 20px 48px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .card-title{
      margin-top:34px;
      text-align:center;
      color:var(--muted);
      letter-spacing:.52em;
      font-size:clamp(15px,2.6vw,23px);
    }

    .biotime{
      margin-top:18px;
      text-align:center;
      font-size:clamp(98px,19vw,165px);
      font-weight:300;
      line-height:1;
    }

    .wave{
      position:absolute;
      left:0;
      right:0;
      bottom:14px;
      height:92px;
    }

    .wave svg{width:100%;height:100%}
    .wave path{
      fill:none;
      stroke:#87d7ff;
      stroke-width:4.2;
      stroke-linecap:round;
      filter:
        drop-shadow(0 0 8px rgba(126,216,255,.82))
        drop-shadow(0 0 12px rgba(82,152,255,.34));
    }

    .domain{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:106px;
      z-index:5;
      padding:10px 24px;
      border-radius:22px;
      border:1px solid rgba(140,160,255,.12);
      background:rgba(19,28,55,.7);
      color:rgba(245,248,255,.92);
      font-size:15px;
      backdrop-filter:blur(8px);
    }

    .nav{
      position:fixed;
      left:16px;
      right:16px;
      bottom:14px;
      z-index:6;
      height:86px;
      border-radius:30px;
      border:1px solid rgba(122,158,255,.14);
      background:linear-gradient(180deg, rgba(8,18,46,.84), rgba(2,8,22,.94));
      backdrop-filter:blur(16px);
      display:flex;
      align-items:center;
      justify-content:space-around;
      box-shadow:
        0 14px 30px rgba(0,0,0,.28),
        inset 0 0 24px rgba(85,132,255,.05);
    }

    .nav-item{
      width:56px;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:.98;
    }

    .nav-item svg{
      width:28px;
      height:28px;
      stroke:#eef5ff;
      stroke-width:1.8;
      fill:none;
    }

    .nav-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:104px;
      height:104px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 34%, rgba(176,228,255,.24), rgba(89,120,255,.18) 42%, rgba(10,21,52,.95) 76%);
      box-shadow:
        0 0 0 10px rgba(97,125,255,.05),
        0 0 26px rgba(92,168,255,.24),
        inset 0 0 35px rgba(130,180,255,.13);
    }

    .nav-center .logo-mini{
      width:44px;
      height:44px;
      filter:drop-shadow(0 0 10px rgba(127,194,255,.34));
    }

    @media (max-width:430px){
      .screen{padding:20px 20px 146px}
      .subtitle{letter-spacing:.28em}
      .enter{height:68px}
      .card{min-height:252px}
      .nav{height:82px}
      .nav-center{width:94px;height:94px}
      .domain{bottom:100px}
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="stars"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="bottom-orb"></div>

    <div class="topbar">
      <button class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24">
          <path d="M4 6H20"></path>
          <path d="M4 12H20"></path>
          <path d="M4 18H20"></path>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="logo-wrap">
        <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#dff6ff"/>
              <stop offset="46%" stop-color="#8fd0ff"/>
              <stop offset="100%" stop-color="#6678ff"/>
            </linearGradient>
            <radialGradient id="dotg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#a9deff"/>
              <stop offset="100%" stop-color="#6ea7ff"/>
            </radialGradient>
          </defs>
          <path d="M110 10L190 230H158L110 95L62 230H30L110 10Z" fill="url(#g1)"/>
          <path d="M110 95L156 190H136L110 132L84 190H64L110 95Z" fill="#102457" opacity=".9"/>
          <circle cx="110" cy="98" r="12" fill="url(#dotg)" />
        </svg>
      </div>
      <div class="brand">AION</div>
      <div class="subtitle">BIOLOGICAL UPGRADE SYSTEM</div>
      <div class="enter">
        <span>ENTER SYSTEM</span>
        <span>→</span>
      </div>
    </section>

    <section class="card">
      <div class="card-title">BIO TIME</div>
      <div class="biotime">8.4</div>
      <div class="wave">
        <svg viewBox="0 0 600 120" preserveAspectRatio="none">
          <path d="M0,84 C56,100 108,104 166,92 C224,80 276,53 334,51 C392,49 448,78 506,79 C542,79 572,72 600,58" />
        </svg>
      </div>
    </section>

    <div class="domain">app.aion-live.com</div>

    <nav class="nav">
      <div class="nav-item" aria-label="Home">
        <svg viewBox="0 0 24 24">
          <path d="M4 11.5L12 5L20 11.5"></path>
          <path d="M6.5 10.8V19H17.5V10.8"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="History">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8"></circle>
          <path d="M12 7.5V12L15.5 14"></path>
        </svg>
      </div>

      <div class="nav-center" aria-label="Center">
        <svg class="logo-mini" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#dff6ff"/>
              <stop offset="46%" stop-color="#8fd0ff"/>
              <stop offset="100%" stop-color="#6678ff"/>
            </linearGradient>
            <radialGradient id="dotg2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#a9deff"/>
              <stop offset="100%" stop-color="#6ea7ff"/>
            </radialGradient>
          </defs>
          <path d="M110 10L190 230H158L110 95L62 230H30L110 10Z" fill="url(#g2)"/>
          <path d="M110 95L156 190H136L110 132L84 190H64L110 95Z" fill="#102457" opacity=".9"/>
          <circle cx="110" cy="98" r="12" fill="url(#dotg2)" />
        </svg>
      </div>

      <div class="nav-item" aria-label="Wave">
        <svg viewBox="0 0 24 24">
          <path d="M2 13h4l2-5 3 10 2-6 2 3h7"></path>
        </svg>
      </div>

      <div class="nav-item" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </div>
    </nav>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#040b22"); } catch(e) {}
      try { tg.setBackgroundColor("#040b22"); } catch(e) {}
    }
  </script>
</body>
</html>
