<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AION</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #020814;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background-color: #020814;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .tap {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.08s ease, opacity 0.08s ease;
    }

    .tap:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .hidden {
      display: none;
    }

    /* SCREEN 1 = ENTRY */
    #screen1 {
      background-image: url("/screen-1");
    }

    .s1-enter {
      left: 18%;
      top: 39%;
      width: 64%;
      height: 7%;
      border-radius: 999px;
    }

    .s1-home {
      left: 17%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-history {
      left: 33%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-center {
      left: 45%;
      bottom: 16.8%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s1-wave {
      left: 63%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s1-profile {
      left: 79%;
      bottom: 19.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    /* SCREEN 2 = SLEEP */
    #screen2 {
      background-image: url("/screen-2");
    }

    .s2-start-analysis {
      left: 18%;
      bottom: 11%;
      width: 64%;
      height: 6.5%;
      border-radius: 999px;
    }

    .s2-home {
      left: 13%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-history {
      left: 31%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-center {
      left: 45%;
      bottom: 1%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s2-wave {
      left: 63%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s2-profile {
      left: 81%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    /* SCREEN 3 = RESULT */
    #screen3 {
      background-image: url("/screen-3");
    }

    .s3-back {
      left: 9%;
      top: 11%;
      width: 18%;
      height: 5%;
    }

    .s3-home {
      left: 13%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-history {
      left: 31%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-center {
      left: 45%;
      bottom: 1%;
      width: 16%;
      height: 8%;
      border-radius: 50%;
    }

    .s3-wave {
      left: 63%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }

    .s3-profile {
      left: 81%;
      bottom: 3.2%;
      width: 9%;
      height: 5%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen1">
    <button class="tap s1-enter" id="goScreen2" aria-label="Enter System"></button>
    <button class="tap s1-home" id="s1Home"></button>
    <button class="tap s1-history" id="s1History"></button>
    <button class="tap s1-center" id="s1Center"></button>
    <button class="tap s1-wave" id="s1Wave"></button>
    <button class="tap s1-profile" id="s1Profile"></button>
  </div>

  <div class="screen hidden" id="screen2">
    <button class="tap s2-start-analysis" id="goScreen3" aria-label="Start Analysis"></button>

    <button class="tap s2-home" id="backToScreen1From2"></button>
    <button class="tap s2-history" id="s2History"></button>
    <button class="tap s2-center" id="s2Center"></button>
    <button class="tap s2-wave" id="s2Wave"></button>
    <button class="tap s2-profile" id="s2Profile"></button>
  </div>

  <div class="screen hidden" id="screen3">
    <button class="tap s3-back" id="backToScreen2"></button>

    <button class="tap s3-home" id="backToScreen1From3"></button>
    <button class="tap s3-history" id="s3History"></button>
    <button class="tap s3-center" id="backToScreen2Center"></button>
    <button class="tap s3-wave" id="s3Wave"></button>
    <button class="tap s3-profile" id="s3Profile"></button>
  </div>

  <script>
    (function () {
      try {
        if (window.Telegram && window.Telegram.WebApp) {
          const tg = window.Telegram.WebApp;
          tg.ready();
          tg.expand();
          try { tg.setHeaderColor("#020814"); } catch (e) {}
          try { tg.setBackgroundColor("#020814"); } catch (e) {}
        }
      } catch (e) {}

      ["/screen-1", "/screen-2", "/screen-3"].forEach(function (src) {
        const img = new Image();
        img.src = src;
      });

      const screen1 = document.getElementById("screen1");
      const screen2 = document.getElementById("screen2");
      const screen3 = document.getElementById("screen3");

      function showScreen(n) {
        screen1.classList.add("hidden");
        screen2.classList.add("hidden");
        screen3.classList.add("hidden");

        if (n === 1) screen1.classList.remove("hidden");
        if (n === 2) screen2.classList.remove("hidden");
        if (n === 3) screen3.classList.remove("hidden");
      }

      function bindClick(id, fn) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("click", fn);
      }

      /* Основные переходы */
      bindClick("goScreen2", function () { showScreen(2); });
      bindClick("goScreen3", function () { showScreen(3); });

      /* Назад */
      bindClick("backToScreen2", function () { showScreen(2); });
      bindClick("backToScreen2Center", function () { showScreen(2); });
      bindClick("backToScreen1From2", function () { showScreen(1); });
      bindClick("backToScreen1From3", function () { showScreen(1); });

      /* Нижняя навигация */
      bindClick("s1Home", function () { showScreen(1); });
      bindClick("s1Center", function () { showScreen(2); });

      bindClick("s2Center", function () { showScreen(2); });

      bindClick("s3History", function () { showScreen(3); });
      bindClick("s3Wave", function () { showScreen(3); });

      /* Заглушки, чтобы ничего не ломалось */
      [
        "s1History", "s1Wave", "s1Profile",
        "s2History", "s2Wave", "s2Profile",
        "s3Profile"
      ].forEach(function (id) {
        bindClick(id, function () {
          console.log("click:", id);
        });
      });
    })();
  </script>
</body>
</html>
