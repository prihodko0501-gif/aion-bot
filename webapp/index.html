    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;

    html, body {
      width: 100%;
      height: 100%;
      background: #020814;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;

    .screen {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background-color: #020814;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .tap {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      z-index: 10;
    }

    .hidden {
      display: none;
    }
