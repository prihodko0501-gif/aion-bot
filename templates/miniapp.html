<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AION Mini App</title>
  <style>
    :root{
      --bg:#020b1f;
      --card:#101a34;
      --line:#22345d;
      --text:#f3f7ff;
      --muted:#9aa9c4;
      --accent:#7fc6ff;
    }
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(31,72,150,.35) 0%, rgba(2,11,31,1) 45%),
        linear-gradient(180deg, #03122f 0%, #020b1f 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:460px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .brand{
      text-align:center;
      margin:20px 0 22px;
    }
    .brand h1{
      margin:0;
      font-size:58px;
      font-weight:300;
      letter-spacing:6px;
    }
    .brand p{
      margin:8px 0 0;
      font-size:12px;
      letter-spacing:5px;
      color:var(--muted);
      text-transform:uppercase;
    }
    .tabs{
      display:flex;
      gap:12px;
      margin-bottom:18px;
    }
    .tab{
      flex:1;
      border:none;
      border-radius:18px;
      padding:18px 12px;
      background:rgba(16,26,52,.9);
      color:var(--text);
      font-size:18px;
      cursor:pointer;
      border:1px solid transparent;
    }
    .tab.active{
      border:1px solid var(--accent);
      box-shadow:0 0 0 1px rgba(127,198,255,.15) inset;
    }
    .section{
      display:none;
    }
    .section.active{
      display:block;
    }
    .card{
      background:rgba(16,26,52,.9);
      border:1px solid rgba(34,52,93,.9);
      border-radius:28px;
      padding:26px;
      margin-bottom:18px;
      box-shadow:0 0 30px rgba(0,0,0,.12);
    }
    .hero{
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }
    .label{
      font-size:12px;
      letter-spacing:5px;
      color:var(--muted);
      text-transform:uppercase;
      margin-bottom:18px;
    }
    .hero-value{
      font-size:72px;
      line-height:1;
      font-weight:300;
      margin:0 0 18px;
    }
    .sub{
      color:var(--muted);
      font-size:17px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .metric-card{
      min-height:160px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .metric-title{
      font-size:12px;
      letter-spacing:5px;
      color:var(--muted);
      text-transform:uppercase;
    }
    .metric-value{
      font-size:44px;
      font-weight:300;
      line-height:1.1;
      word-break:break-word;
    }
    .history-buttons{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }
    .history-btn{
      flex:1;
      border:none;
      border-radius:14px;
      padding:12px 10px;
      background:rgba(16,26,52,.9);
      color:var(--text);
      font-size:16px;
      border:1px solid transparent;
      cursor:pointer;
    }
    .history-btn.active{
      border:1px solid var(--accent);
    }
    .history-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .history-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
      border-top:1px solid rgba(255,255,255,.06);
      font-size:17px;
      gap:12px;
    }
    .history-item:first-child{
      border-top:none;
    }
    .history-date{
      color:var(--muted);
      font-size:15px;
    }
    .history-main{
      font-size:18px;
    }
    .empty,.error{
      text-align:center;
      padding:18px 0;
      font-size:17px;
    }
    .empty{
      color:var(--muted);
    }
    .error{
      color:#ffb4b4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>AION</h1>
      <p>Biological Upgrade System</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="history">History</button>
    </div>

    <section id="dashboard" class="section active">
      <div class="card hero">
        <div class="label">BioTime</div>
        <div id="biotime" class="hero-value">—</div>
        <div id="entryDate" class="sub">Нет данных</div>
      </div>

      <div class="grid">
        <div class="card metric-card">
          <div class="metric-title">Sleep</div>
          <div id="sleepMetric" class="metric-value">—</div>
        </div>

        <div class="card metric-card">
          <div class="metric-title">Stress</div>
          <div id="stressMetric" class="metric-value">—</div>
        </div>

        <div class="card metric-card">
          <div class="metric-title">Recovery</div>
          <div id="recoveryMetric" class="metric-value">—</div>
        </div>

        <div class="card metric-card">
          <div class="metric-title">Pressure</div>
          <div id="pressureMetric" class="metric-value">—</div>
        </div>
      </div>
    </section>

    <section id="history" class="section">
      <div class="history-buttons">
        <button class="history-btn active" data-days="7">7 дней</button>
        <button class="history-btn" data-days="30">30 дней</button>
        <button class="history-btn" data-days="90">90 дней</button>
      </div>

      <div class="card">
        <div id="historyRows" class="history-list">
          <div class="empty">Загрузка...</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API = window.location.origin;

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value ?? "—";
    }

    async function loadDashboard() {
      try {
        const res = await fetch(API + "/api/dashboard", { cache: "no-store" });
        const json = await res.json();
        const d = json.data || {};

        setText("biotime", d.biotime ?? "—");
        setText("entryDate", d.biotime != null ? "Данные загружены" : "Нет данных");
        setText("sleepMetric", d.sleep != null ? d.sleep + "%" : "—");
        setText("stressMetric", d.stress != null ? d.stress + "%" : "—");
        setText("recoveryMetric", d.recovery != null ? d.recovery + "%" : "—");
        setText("pressureMetric", d.pressure ?? "—");
      } catch (e) {
        setText("entryDate", "Ошибка загрузки");
      }
    }

    async function loadHistory(days = 7) {
      const box = document.getElementById("historyRows");
      box.innerHTML = '<div class="empty">Загрузка...</div>';

      try {
        const res = await fetch(API + "/api/history?days=" + days, { cache: "no-store" });
        const json = await res.json();
        const rows = Array.isArray(json.data) ? json.data : [];

        if (!rows.length) {
          box.innerHTML = '<div class="empty">Нет данных за ' + days + ' дней</div>';
          return;
        }

        box.innerHTML = "";

        rows.forEach((row) => {
          const item = document.createElement("div");
          item.className = "history-item";
          item.innerHTML = `
            <div>
              <div class="history-main">BioTime ${row.biotime ?? "—"}</div>
              <div class="history-date">${row.date ?? "—"}</div>
            </div>
            <div style="text-align:right">
              <div>Sleep ${row.sleep ?? "—"}%</div>
              <div>Stress ${row.stress ?? "—"}%</div>
              <div>Recovery ${row.recovery ?? "—"}%</div>
            </div>
          `;
          box.appendChild(item);
        });
      } catch (e) {
        box.innerHTML = '<div class="error">Ошибка загрузки истории</div>';
      }
    }

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".section").forEach((s) => s.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.querySelectorAll(".history-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".history-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        loadHistory(btn.dataset.days);
      });
    });

    loadDashboard();
    loadHistory(7);
  </script>
</body>
</html>
