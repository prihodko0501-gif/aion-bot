<!doctype html>
<html lang="ru">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AION</title>

<style>

body{
background:#020b1f;
color:white;
font-family:-apple-system,Arial;
text-align:center;
padding:30px;
}

h1{
font-size:48px;
letter-spacing:6px;
margin-bottom:40px;
}

.card{
background:#101a34;
padding:30px;
border-radius:20px;
margin-bottom:20px;
}

.big{
font-size:70px;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.metric{
font-size:36px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
margin-top:20px;
padding:15px;
font-size:20px;
border-radius:10px;
border:none;
background:#1f3c73;
color:white;
width:100%;
}

</style>

</head>

<body>

<h1>AION</h1>

<div class="card">

<div>BioTime</div>
<div id="biotime" class="big">-</div>

</div>

<div class="grid">

<div class="card">
<div>Sleep</div>
<div id="sleep" class="metric">-</div>
</div>

<div class="card">
<div>Stress</div>
<div id="stress" class="metric">-</div>
</div>

<div class="card">
<div>Recovery</div>
<div id="recovery" class="metric">-</div>
</div>

<div class="card">
<div>Pressure</div>
<div id="pressure" class="metric">-</div>
</div>

</div>

<div class="card">

<h2>Input Data</h2>

<input id="sleep_input" placeholder="Sleep %">
<input id="stress_input" placeholder="Stress %">
<input id="recovery_input" placeholder="Recovery %">
<input id="pressure_input" placeholder="Pressure 120/80">

<button onclick="save()">Save</button>

</div>

<script>

const API="https://aion-bot.onrender.com"

async function load(){

let r=await fetch(API+"/api/dashboard")

let j=await r.json()

let d=j.data

document.getElementById("biotime").innerText=d.biotime
document.getElementById("sleep").innerText=d.sleep+"%"
document.getElementById("stress").innerText=d.stress+"%"
document.getElementById("recovery").innerText=d.recovery+"%"
document.getElementById("pressure").innerText=d.pressure

}

async function save(){

await fetch(API+"/api/demo-seed")

load()

}

load()

</script>

</body>
</html>
